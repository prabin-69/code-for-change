name: sewaghar_new
description: "A service marketplace app connecting customers with professionals."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^7.7.0

  # Networking
  dio: ^5.7.0
  dartz: ^0.10.1

  # Routing
  go_router: ^14.2.0

  # Secure Storage
  flutter_secure_storage: ^9.2.2

  # Logging
  logger: ^2.4.0

  # Authentication
  pin_code_fields: ^8.0.1
  intl_phone_number_input: ^0.7.4

  # Location
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  google_maps_flutter: ^2.6.0

  # Images
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # UI
  flutter_rating_bar: ^4.0.1
  flutter_svg: ^2.0.10+1

  # URL
  url_launcher: ^6.3.0

  # WebView
  webview_flutter: ^4.4.4

  # Connectivity
  connectivity_plus: ^6.0.3

  # Local Storage
  shared_preferences: ^2.3.2

  # Internationalization
  intl: ^0.19.0

  # Permissions
  permission_handler: ^11.3.1

  # Firebase
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0
  firebase_storage: ^13.0.0
  firebase_messaging: ^16.0.0
  firebase_analytics: ^12.0.0
  firebase_crashlytics: ^5.0.0

  # Notifications
  flutter_local_notifications: ^17.1.2

  # Socket
  socket_io_client: ^2.0.3+1

  # JSON Serialization
  json_annotation: ^4.9.0

  # QR Code
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

  build_runner: ^2.4.13
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true